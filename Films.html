function normalizeLangName(l){
  if (!l) return "";
  const s = String(l).trim();

  // קודם קוד שפה
  if (s.length === 2 && LANG_CODE_FIX[s]) {
    return LANG_CODE_FIX[s];
  }

  // אחר כך שם מקומי
  return LANG_NAME_FIX[s] || s;
}

// Search (movies + tv)
async function searchTMDB(queryText) {
  const run = async (lang) => {
    const url =
      `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}` +
      `&query=${encodeURIComponent(queryText)}&language=${lang}` +
      `&include_adult=false&region=IL`;
    const res = await fetch(url);
    if (!res.ok) {
      const body = await res.text().catch(() => "<no body>");
      throw new Error(`TMDB multi search failed (${res.status}) ${body}`);
    }
    const data = await res.json();
    return (data.results || [])
      .filter((r) => r.media_type === "movie" || r.media_type === "tv")
      .map((r) => ({
        mediaType: r.media_type,
        id: r.id,
        title:
          r.title || r.name || r.original_title || r.original_name || "",
        originalTitle:
          r.original_title || r.original_name || r.title || r.name || "",
        overview: r.overview || "",
        poster_path: r.poster_path || "",
        releaseDate: r.release_date || r.first_air_date || "",
        releaseYear: (r.release_date || r.first_air_date || "").slice(0, 4)
          ? parseInt((r.release_date || r.first_air_date).slice(0, 4), 10)
          : null,
      }));
  };
  let results = [];
  try {
    results = await run("he-IL");
  } catch {}
  if (results.length === 0) {
    results = await run("en-US");
  }
  return results.slice(0, 12);
}

async function getTvDetailsMerged(id) {
  const fetchJson = async (url) => {
    const r = await fetch(url);
    if (!r.ok) {
      const t = await r.text().catch(() => "<no body>");
      throw new Error(`TMDB details failed (${r.status}) ${t}`);
    }
    return r.json();
  };

  const base =
    `https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_API_KEY}`;

  let he = null;
  let en = null;

  try {
    he = await fetchJson(base + "&language=he-IL");
  } catch {}

  try {
    en = await fetchJson(base + "&language=en-US");
  } catch {}

  if (!he && !en) return {};

  return {
    ...(en || {}),
    ...(he || {}),

    // עברית עדיפה
    name: he?.name || en?.name,
    overview: he?.overview || en?.overview,
    genres:
      Array.isArray(he?.genres) && he.genres.length
        ? he.genres
        : en?.genres || [],

    // אנגלית עדיפה (אמינות)
    episode_run_time:
      Array.isArray(en?.episode_run_time)
        ? en.episode_run_time
        : [],
  };
}

  const creditsHeUrl =
    `https://api.themoviedb.org/3/${kind}/${id}/credits?api_key=${TMDB_API_KEY}&language=he-IL`;

  try {
    if (kind === "movie") {
      // סרטים – עברית כבעבר
      details = await fetchJson(detailsHeUrl);
    } else {

      details = await getTvDetailsMerged(id);
    }
  } catch {}

  let credits = { cast: [] };
  try {
    credits = await fetchJson(creditsHeUrl);
  } catch {}

  const cast = Array.isArray(credits.cast)
    ? credits.cast.slice(0, 8).map((p) => p.name)
    : [];

  const genres = Array.isArray(details.genres)
    ? details.genres.map((g) => g.name)
    : [];

  const title =
    kind === "tv"
      ? details.name || details.original_name
      : details.title || details.original_title;

  const originalTitle =
    kind === "tv"
      ? details.original_name || details.name
      : details.original_title || details.title;

  const releaseDate =
    (kind === "tv"
      ? details.first_air_date
      : details.release_date) || "";

  const releaseYear = releaseDate
    ? parseInt(releaseDate.slice(0, 4), 10)
    : null;

  // 🔴 כל הלוגיקה שהייתה – נשמרת
  const LANG_CODE_MAP = {
    ko: "קוריאנית",
    en: "אנגלית",
    he: "עברית",
    ru: "רוסית",
    ja: "יפנית",
    es: "ספרדית",
    fr: "צרפתית",
    de: "גרמנית"
  };

  const spoken = (details.spoken_languages || []).map(
    (l) => l.iso_639_1
  );

  const originalLangCode = details?.original_language || "";

  console.log(
    "TV episode_run_time:",
    details.name || details.original_name,
    details.episode_run_time
  );

  return {
    mediaType: kind,
    movieId: String(details?.id ?? id ?? ""),
    title: title || "",
    originalTitle: originalTitle || "",
    overview: details?.overview || "",
    posterUrl: TMDB_IMAGE(details?.poster_path),
    genres,
    cast,
    releaseDate,
    releaseYear,
    languages: spoken,
    originalLangCode,
    runtime:
      kind === "movie" ? details.runtime ?? null : null,
    episodeRuntime:
      kind === "tv" &&
      Array.isArray(details.episode_run_time)
        ? details.episode_run_time[0]
        : null,
  };
}

function formatRuntime(mins){
  if (!mins) return "";
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h ? `${h}ש ${m}ד` : `${m}ד`;
}

function rebuildGenreFilter() {
  const sel = $("#genreFilter");
  if (!sel) return;
  const current = sel.value;
  const set = new Set();
  allViews.forEach((v) => (v.genres || []).forEach((g) => set.add(g)));
  sel.innerHTML =
    '<option value="">הכול</option>' +
    Array.from(set)
      .sort()
      .map((g) => `<option>${g}</option>`)
      .join("");
  if ([...sel.options].some((o) => o.value === current)) sel.value = current;
}

function rebuildLanguageFilter(){

  // בונה רשימת שפות מכל הפריטים
  // בונה רשימת שפות מכל הפריטים
  const set = new Set();

  (allViews || []).forEach(v => {
    (v.languages || []).forEach(lang => {
      const fixed = normalizeLangName(lang);
      if (fixed) {
        set.add(fixed);
      }
    });
  });


  // שומר בחירות קודמות
  const prev = Array.from(sel.selectedOptions).map(o => o.value);

  // ממלא את ה־<select multiple>
  sel.innerHTML = Array.from(set)
    .sort((a,b) => a.localeCompare(b,'he'))
    .map(n => `<option value="${n}">${n}</option>`)
    .join('');

  // מחזיר את הבחירה הקודמת אם עדיין קיימת
  Array.from(sel.options).forEach(o => {
    if (prev.includes(o.value)) o.selected = true;
  });
}


 


// === Utils ===
function fmtDate(d) {
  try {
    return d.toLocaleDateString("he-IL", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
    });
  } catch {
    return "";
  }
}
function toDateOnly(d) {
  return d.toISOString().slice(0, 10);
}
function abbr(n) {
  if (n == null) return "";
  const x = Number(n);
  if (x >= 1_000_000) return (x / 1_000_000).toFixed(1).replace(/\.0$/, "") + "m";
  if (x >= 1_000) return (x / 1_000).toFixed(1).replace(/\.0$/, "") + "k";
  return String(x);
}

function netflixUrl(vOrDet) {
  // בוחרים שם חכם ומנקים סוגריים/שנים מהשם עצמו אם קיימים
  let name =
    (vOrDet.originalTitle && vOrDet.originalTitle.trim()) ||
    (vOrDet.title && vOrDet.title.trim()) ||
    "";
  // הסרה של שנה בסוגריים או כל טקסט בסוף בסוגריים
  name = name.replace(/\s*\(\s*\d{4}\s*\)\s*$/, "").trim();
  name = name.replace(/\s*\([^)]*\)\s*$/, "").trim();

  const q = name; // ללא שנה
  return "https://www.netflix.com/search?q=" + encodeURIComponent(q);
}

 

function hasHebrew(t){ return /[\u0590-\u05FF]/.test(t||''); }
function cut(s,max=1000){ s=String(s||''); return s.length>max ? s.slice(0,max-1)+'…' : s; }






async function fetchTmdbReviews(kind, id){
  const url = `https://api.themoviedb.org/3/${kind}/${id}/reviews?api_key=${TMDB_API_KEY}&page=1`;
  const r = await fetch(url);
  if(!r.ok){ throw new Error('TMDB reviews '+r.status); }
  const j = await r.json();
  const arr = Array.isArray(j.results) ? j.results : [];
  const he = arr.filter(x => hasHebrew(x.content));
  const en = arr.filter(x => !hasHebrew(x.content) && (x?.iso_639_1==='en' || /[A-Za-z]/.test(x.content)));
  const rest = arr.filter(x => !he.includes(x) && !en.includes(x));
  return [...he, ...en, ...rest];
}

function renderReviewsList(panel, items){
  panel.innerHTML = '';
  if(!items.length){
    panel.innerHTML = '<div class="text-sm text-gray-500">אין ביקורות להצגה</div>';
    return;
  }
  items.slice(0,8).forEach(it=>{
    const div = document.createElement('div');
    div.className = 'ext-rev-item';
    const author = it.author || (it.author_details?.username) || 'מאת משתמש';
    const rating = it.author_details?.rating != null ? ` · דירוג ${it.author_details.rating}/10` : '';
    const when = it.created_at ? new Date(it.created_at).toLocaleDateString('he-IL') : '';
    const safeText = cut(it.content, 1000).replace(/</g,'&lt;');

    div.innerHTML = `
      <div class="ext-rev-meta">${when ? when+' · ' : ''}${author}${rating}</div>

      <div class="review-text text-sm text-gray-800">
        ${safeText}
      </div>

     <button class="selectBtn pill px-2 py-1 rounded text-xs mt-1">
        סמן קטע
     </button>


      <div class="mt-1">
        <a href="${it.url}" target="_blank" rel="noopener">קרא עוד ב-TMDB</a>
      </div>
    `;
  
      const btn = div.querySelector(".selectBtn");
      const textDiv = div.querySelector(".review-text");

      btn.addEventListener("click", () => {
        try {
          const selection = window.getSelection();
          selection.removeAllRanges();

          const range = document.createRange();
          range.selectNodeContents(textDiv);

          selection.addRange(range);

          btn.textContent = "מסומן ✓";
          setTimeout(() => {
            btn.textContent = "סמן קטע";
          }, 1500);
        } catch (e) {
          console.error(e);
          btn.textContent = "שגיאה";
        }
      });




    panel.appendChild(div);
  });
}

// === Backfill: add year to titles (run in console: backfillTitlesWithYear()) ===
window.backfillTitlesWithYear = async function () {
  try {
    const snap = await getDocs(collection(db, "views"));
    let updated = 0,
      skipped = 0,
      failed = 0;
    const hasYearSuffix = (title) => /\(\d{4}\)\s*$/.test(title || "");

    for (const d of snap.docs) {
      const v = d.data();
      let title = v.title || "";
      let year = v.releaseYear ?? null;

      if (hasYearSuffix(title)) {
        skipped++;
        continue;
      }

      if (year == null && v.source === "tmdb" && v.movieId) {
        try {
          const det = await getMovieDetails(v.movieId, v.mediaType || "movie");
          year = det?.releaseYear ?? null;
        } catch {}
        await new Promise((r) => setTimeout(r, 150));
      }

      if (year == null || !Number.isInteger(year)) {
        skipped++;
        continue;
      }

      const newTitle = `${title} (${year})`;
      try {
        await updateDoc(doc(db, "views", d.id), {
          title: newTitle,
          titleLower: newTitle.toLowerCase(),
        });
        updated++;
      } catch (e) {
        console.error("update failed", d.id, e);
        failed++;
      }
    }
    console.log(
      `Titles backfill → updated=${updated}, skipped=${skipped}, failed=${failed}`
    );
    alert(
      `סיום: עודכנו ${updated}, דולגו ${skipped}, כשלים ${failed} (פרטים בקונסולה)`
    );
  } catch (e) {
    console.error("backfillTitlesWithYear fatal", e);
    alert("שגיאה בהרצת backfill — ראה קונסולה");
  }
};

   async function fetchActorCredits(personId) {
      const url =
        `https://api.themoviedb.org/3/person/${personId}/combined_credits` +
        `?api_key=${TMDB_API_KEY}&language=he-IL`;

      const r = await fetch(url);
      if (!r.ok) throw new Error("combined credits failed");

      const j = await r.json();

      return (j.cast || [])
        .filter(c => c.media_type === "movie" || c.media_type === "tv")
        .sort((a, b) => {
          const yA = parseInt(
            (a.release_date || a.first_air_date || "0000").slice(0,4)
          );
          const yB = parseInt(
            (b.release_date || b.first_air_date || "0000").slice(0,4)
          );
          return yB - yA; // חדש → ישן
        })

        .slice(0, 30);
}
