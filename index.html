<!doctype html>
<html lang="he" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DAVID FILMS – יומן צפייה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="films.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g1' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237C3AED'/%3E%3Cstop offset='0.5' stop-color='%23E11D48'/%3E%3Cstop offset='1' stop-color='%23F59E0B'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M6 22h52v30a6 6 0 0 1-6 6H12a6 6 0 0 1-6-6V22z' fill='url(%23g1)'/%3E%3Cpath d='M6 22l6-12h12l-6 12h12l6-12h12l-6 12h12l6-12v12H6z' fill='%23111' opacity='.9'/%3E%3C/svg%3E">
</head>

<body class="min-h-screen text-gray-800">

  <!-- ===== מסך כניסה ===== -->
  <div id="loginScreen"
       class="fixed inset-0 bg-gray-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-8 text-center max-w-sm w-full mx-4"
         style="box-shadow:0 16px 48px rgba(0,0,0,.12)">
      <svg class="mx-auto mb-4" width="48" height="48" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#7C3AED"/>
            <stop offset="50%" stop-color="#E11D48"/>
            <stop offset="100%" stop-color="#F59E0B"/>
          </linearGradient>
        </defs>
        <path d="M6 22h52v30a6 6 0 0 1-6 6H12a6 6 0 0 1-6-6V22z" fill="url(#lg)"/>
        <path d="M6 22l6-12h12l-6 12h12l6-12h12l-6 12h12l6-12v12H6z" fill="#111" opacity=".9"/>
      </svg>
      <h1 class="text-2xl font-extrabold mb-1"
          style="background-image:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        DAVID FILMS
      </h1>
      <p class="text-gray-500 mb-6 text-sm">יומן הצפייה האישי שלי</p>
      <button id="signInBtn"
              class="btn rounded-xl px-5 py-3 w-full font-semibold flex items-center justify-center gap-3 text-base">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.6-3-11.3-7.3L6 33.8C9.4 39.7 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.5-4.6 5.8l6.2 5.2C40.8 35.5 44 30.2 44 24c0-1.3-.1-2.7-.4-4z"/>
        </svg>
        כניסה עם Google
      </button>
    </div>
  </div>

  <!-- ===== Header ===== -->
  <header class="sticky top-0 z-20 backdrop-blur bg-white/70 border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex flex-wrap items-center gap-3">

      <div class="app-title text-2xl">
        <svg class="app-logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#7C3AED"/>
              <stop offset="50%" stop-color="#E11D48"/>
              <stop offset="100%" stop-color="#F59E0B"/>
            </linearGradient>
          </defs>
          <path d="M6 22h52v30a6 6 0 0 1-6 6H12a6 6 0 0 1-6-6V22z" fill="url(#g1)"/>
          <path d="M6 22l6-12h12l-6 12h12l6-12h12l-6 12h12l6-12v12H6z" fill="#111" opacity=".9"/>
        </svg>
        <span style="background-image:linear-gradient(135deg,#7c3aed,#06b6d4);"
              class="bg-clip-text text-transparent">
          DAVID FILMS &bull; יומן צפייה
        </span>
      </div>

      <!-- Stats bar (filled by JS) -->
      <div id="statsBar" class="stats-bar hidden"></div>

      <!-- User info -->
      <div id="userInfo" class="hidden ms-auto flex items-center gap-2">
        <img id="userPhoto" class="w-8 h-8 rounded-full hidden" alt="">
        <span id="userName" class="text-sm text-gray-600 hidden md:inline"></span>
        <button id="signOutBtn"
                class="text-xs text-gray-400 hover:text-red-500 transition px-2 py-1 rounded border border-gray-200 hover:border-red-300">
          יציאה
        </button>
      </div>

      <div class="kbd-hints hidden md:flex items-center gap-2 text-sm text-gray-500">
        מקשי קיצור:
        <span class="kbd">F1</span> פתח חיפוש &middot;
        <span class="kbd">F2</span> טוגל חיפוש &middot;
        <span class="kbd">F3</span> סרט חדש
      </div>

    </div>
  </header>

  <!-- ===== Main content (hidden until signed in) ===== -->
  <div id="appContent" class="hidden">
  <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">

    <!-- Add form toggle -->
    <div class="flex items-center gap-2">
      <button id="toggleAdd" type="button" class="pill px-3 py-1 rounded-xl"
              aria-expanded="false" aria-controls="addPanel">
        + הוסף צפייה <span id="addCaret">▼</span>
      </button>
    </div>

    <!-- Add form -->
    <section id="addPanel" class="card rounded-2xl p-4 md:p-6 frame-orange hidden">
      <h2 class="text-xl font-bold mb-4">הוסף צפייה</h2>
      <form id="addForm" class="grid grid-cols-1 md:grid-cols-12 gap-3 items-start">

        <div class="md:col-span-4">
          <label class="block text-sm mb-1">שם סרט</label>
          <div class="relative">
            <input id="movieInput" class="input w-full rounded-xl px-3 py-2"
                   placeholder="הקלד שם…" autocomplete="off" />
            <div id="searchResults"
                 class="absolute inset-x-0 top-full mt-1 bg-white rounded-xl shadow border border-gray-200 hidden max-h-80 overflow-auto z-50">
            </div>
          </div>
        </div>

        <div class="md:col-span-3">
          <label class="block text-sm mb-1">תאריך צפייה</label>
          <input id="watchDate" type="date" class="input w-full rounded-xl px-3 py-2" />
        </div>

        <div class="md:col-span-5">
          <label class="block text-sm mb-1">הערות</label>
          <input id="notes" class="input w-full rounded-xl px-3 py-2"
                 placeholder="מה חשבת? עם מי צפית?" />
        </div>

        <div class="md:col-span-12">
          <label class="inline-flex items-center gap-2 text-sm">
            <input type="checkbox" id="toWatch">
            לצפייה עתידית (עדיין לא צפיתי)
          </label>
        </div>

        <input type="hidden" id="pickedMovieJson" />

        <div class="md:col-span-12 flex gap-2 items-center">
          <button class="btn rounded-xl px-4 py-2 font-semibold" id="saveBtn" type="submit">שמירה</button>
          <button class="rounded-xl px-4 py-2 font-semibold border pill" id="clearBtn" type="button">ניקוי</button>
          <div id="saveStatus" class="ms-auto text-sm text-gray-600"></div>
        </div>

      </form>

      <!-- Selected movie preview -->
      <div id="pickedPreview" class="mt-4 hidden">
        <div class="flex gap-3 items-start">
          <img id="previewPoster" class="poster hidden" alt="" />
          <div class="min-w-0 flex-1">
            <div id="previewTitle" class="font-bold"></div>
            <div id="previewRating" class="text-sm text-amber-600 mt-0.5"></div>
            <div id="previewGenres" class="flex flex-wrap gap-2 my-1"></div>
            <div id="previewCast" class="text-sm text-gray-600"></div>
            <div id="previewOverview" class="text-sm text-gray-700 mt-2"></div>
            <button id="unpickBtn" type="button" class="mt-2 text-xs text-blue-600 underline">בטל בחירה</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Search toggle -->
    <div class="flex items-center gap-2">
      <button id="toggleSearch" type="button" class="pill px-3 py-1 rounded-xl"
              aria-expanded="false" aria-controls="searchPanel">
        חיפוש <span id="caret">▼</span>
      </button>
    </div>

    <!-- Search panel -->
    <section id="searchPanel" class="card rounded-2xl p-4 md:p-6 frame-orange hidden">
      <div class="flex flex-col md:flex-row gap-3 md:items-end flex-wrap">

        <div class="md:w-1/2">
          <label class="block text-sm mb-1">חיפוש לפי שם סרט</label>
          <input id="searchBox" class="input w-full rounded-xl px-3 py-2"
                 placeholder="הקלד/י לחיפוש… (גם באנגלית)" />
          <button id="clearFilters" type="button" class="pill px-3 py-2 rounded-xl mt-2">ניקוי חיפוש</button>
        </div>

        <label class="inline-flex items-center gap-2 text-sm mt-2">
          <input type="checkbox" id="filterToWatch">
          הצג רק סרטים לצפייה (שטרם ראיתי)
        </label>

        <div class="md:w-1/4">
          <label class="block text-sm mb-1">סינון לפי ז'אנר</label>
          <select id="genreFilter" class="input w-full rounded-xl px-3 py-2">
            <option value="">הכול</option>
          </select>
        </div>

        <div class="md:w-1/4">
          <label class="block text-sm mb-1">טווח תאריכים</label>
          <div class="flex flex-wrap gap-2">
            <input id="fromDate" type="date" class="input flex-1 min-w-[9rem] rounded-xl px-3 py-2" />
            <input id="toDate"   type="date" class="input flex-1 min-w-[9rem] rounded-xl px-3 py-2" />
          </div>
        </div>

        <div class="md:w-1/3">
          <label class="block text-sm mb-1">סינון לפי שפה</label>
          <select id="langFilter" multiple class="input w-full rounded-xl px-3 py-2"></select>
          <label class="inline-flex items-center gap-2 mt-1 text-sm">
            <input type="checkbox" id="langRequireAll">
            חייב לכלול את כולן
          </label>
          <div class="text-xs text-gray-500 mt-1">טיפ: Ctrl/⌘ לבחירה מרובה</div>
        </div>

      </div>
    </section>

    <!-- Films list -->
    <section class="space-y-3" id="viewsList"></section>

  </main>

  <!-- ===== Templates ===== -->
  <template id="resultItemTpl">
    <button type="button"
            class="w-full text-right px-3 py-2 hover:bg-gray-50 flex gap-3 items-start">
      <img class="poster" />
      <div class="min-w-0">
        <div class="font-semibold leading-tight name"></div>
        <div class="text-xs text-gray-600 altname"></div>
        <div class="text-xs text-gray-500 mt-1 overview truncate-2"></div>
      </div>
    </button>
  </template>

  <template id="viewCardTpl">
    <article class="card rounded-2xl p-3 md:p-4 flex gap-3">
      <img class="poster" />
      <div class="min-w-0 w-full">

        <!-- כותרת + כפתורי ניהול -->
        <div class="flex flex-wrap items-start gap-x-2 gap-y-0.5">
          <h3 class="font-extrabold text-base leading-snug name flex-1 min-w-0"></h3>
          <div class="flex items-center gap-1 shrink-0">
            <span class="text-xs text-gray-400 date"></span>
            <button type="button"
                    class="editBtn text-blue-600 text-xs px-1.5 py-0.5 rounded hover:bg-blue-50">עריכה</button>
            <button type="button"
                    class="delBtn text-red-500 text-xs px-1.5 py-0.5 rounded hover:bg-red-50">מחק</button>
          </div>
          <div class="w-full mt-1 hidden editRow">
            <div class="flex flex-wrap gap-2 items-center">
              <input type="date" class="input rounded-xl px-2 py-1.5 text-sm editDate">
              <textarea class="input editNotes flex-1" rows="1" placeholder="ערוך הערות…"></textarea>
              <button type="button" class="saveEdit btn rounded-xl px-3 py-1.5 text-sm">שמירה</button>
              <button type="button" class="cancelEdit rounded-xl px-3 py-1.5 text-sm border pill">ביטול</button>
            </div>
          </div>
        </div>

        <!-- צ'יפים -->
        <div class="flex flex-wrap gap-1.5 my-1.5 chips"></div>

        <!-- תקציר + שחקנים + הערות -->
        <p class="text-sm text-gray-700 overview truncate-4"></p>
        <div class="text-xs text-gray-500 cast mt-1"></div>
        <div class="text-sm text-cyan-700 mt-1 notes"></div>

        <!-- כפתורי פעולה (JS ישים כאן) -->
        <div class="actions flex flex-wrap gap-1.5 mt-2"></div>

      </div>
    </article>
  </template>

  <!-- ===== Actor drawer (right) ===== -->
  <aside id="actorDrawer"
         class="fixed top-0 right-0 h-full w-full md:w-[420px] bg-white shadow-2xl
                translate-x-full transition-transform duration-300 z-50 flex flex-col">
    <div class="flex items-center gap-3 p-4 border-b">
      <img id="actorPhoto" class="w-14 h-14 rounded-lg object-cover hidden" alt="">
      <div class="min-w-0">
        <h3 id="actorTitle" class="font-bold text-lg truncate"></h3>
        <div class="text-xs text-gray-500">פילמוגרפיה · TMDB</div>
      </div>
      <button id="closeActorDrawer" class="ms-auto text-gray-500 hover:text-black text-xl">✕</button>
    </div>
    <div id="actorMovies" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm"></div>
  </aside>

  <!-- ===== Movie drawer (left) ===== -->
  <aside id="movieDrawer"
         class="fixed top-0 left-0 h-full w-full md:w-[440px] bg-white shadow-2xl
                -translate-x-full transition-transform duration-300 z-40 flex flex-col">
    <div class="flex gap-3 p-4 border-b">
      <img id="moviePoster" class="w-20 rounded-lg hidden" alt="">
      <div class="min-w-0">
        <h3 id="movieTitle" class="font-bold text-lg"></h3>
        <div id="movieMeta" class="text-xs text-gray-600"></div>
      </div>
      <button id="closeMovieDrawer" class="ms-auto text-xl text-gray-500">✕</button>
    </div>
    <div id="movieContent" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm"></div>
  </aside>

  <!-- ===== Netflix Top 10 floating button ===== -->
  <button id="openNetflixTop"
          class="hidden lg:flex fixed left-2 top-1/2 -translate-y-1/2
                 pill nx-pill px-3 py-2 rounded-xl text-sm
                 items-center gap-1 shadow-lg z-30">
    Netflix Top 10 🔥
  </button>

  </div><!-- /appContent -->

  <script type="module" src="films.js"></script>
</body>

</html>
